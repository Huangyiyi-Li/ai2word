<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d97706;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="100%" height="100%" fill="url(#bg-gradient)"/>

  <!-- 装饰元素 -->
  <circle cx="100" cy="100" r="200" fill="rgba(255,255,255,0.05)"/>
  <circle cx="1100" cy="530" r="150" fill="rgba(255,255,255,0.05)"/>
  <circle cx="900" cy="150" r="100" fill="rgba(255,255,255,0.03)"/>

  <!-- 左侧图标区域 -->
  <g transform="translate(80, 200)">
    <!-- 文档图标 -->
    <rect x="0" y="0" width="80" height="100" rx="8" fill="rgba(255,255,255,0.9)" filter="url(#shadow)"/>
    <rect x="15" y="20" width="50" height="4" rx="2" fill="#d97706"/>
    <rect x="15" y="32" width="50" height="4" rx="2" fill="#d97706" opacity="0.6"/>
    <rect x="15" y="44" width="35" height="4" rx="2" fill="#d97706" opacity="0.4"/>
    <rect x="15" y="56" width="45" height="4" rx="2" fill="#d97706" opacity="0.3"/>
    <rect x="15" y="68" width="30" height="4" rx="2" fill="#d97706" opacity="0.2"/>
  </g>

  <!-- 箭头 -->
  <g transform="translate(520, 250)">
    <polygon points="0,20 50,0 50,15 100,15 100,25 50,25 50,40" fill="rgba(255,255,255,0.8)"/>
  </g>

  <!-- 右侧 Word 图标 -->
  <g transform="translate(680, 200)">
    <rect x="0" y="0" width="100" height="120" rx="8" fill="rgba(255,255,255,0.95)" filter="url(#shadow)"/>
    <text x="50" y="65" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#2b579a" text-anchor="middle">W</text>
  </g>

  <!-- 标题 -->
  <text x="600" y="420" font-family="Arial, sans-serif" font-size="64" font-weight="bold" fill="white" text-anchor="middle" filter="url(#shadow)">
    Claude 转Word
  </text>

  <!-- 副标题 -->
  <text x="600" y="480" font-family="Arial, sans-serif" font-size="28" fill="rgba(255,255,255,0.9)" text-anchor="middle">
    Anthropic Claude导出
  </text>

  <!-- 底部品牌 -->
  <text x="600" y="590" font-family="Arial, sans-serif" font-size="18" fill="rgba(255,255,255,0.7)" text-anchor="middle">
    AiToWords.com - 免费AI对话转Word工具
  </text>
</svg>